services:
  postgres:
    image: postgres:16-alpine
    container_name: calendar-viewer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yandex_calendar}
      POSTGRES_USER: ${POSTGRES_USER:-calendar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calendar_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calendar_user} -d ${POSTGRES_DB:-yandex_calendar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: calendar-viewer
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://calendar_user:calendar_password@postgres:5432/yandex_calendar}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${HTTP_PORT:-8083}:8083"

volumes:
  postgres-data:
